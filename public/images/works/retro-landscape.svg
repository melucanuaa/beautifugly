<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#FAF8F5"/>

  <!-- Sun -->
  <circle cx="100" cy="60" r="30" fill="#F2B5D4"/>

  <!-- Mountains -->
  <polygon points="20,140 60,80 100,140" fill="#B8A9E8"/>
  <polygon points="80,140 120,70 160,140" fill="#7EC8C8"/>
  <polygon points="140,140 170,90 200,140" fill="#B8A9E8"/>

  <!-- Water -->
  <rect x="0" y="140" width="200" height="60" fill="#7EC8C8" opacity="0.3"/>

  <!-- Pixel grid overlay -->
  <g opacity="0.1">
    <line x1="0" y1="10" x2="200" y2="10" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="30" x2="200" y2="30" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="50" x2="200" y2="50" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="70" x2="200" y2="70" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="90" x2="200" y2="90" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="110" x2="200" y2="110" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="130" x2="200" y2="130" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="150" x2="200" y2="150" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="170" x2="200" y2="170" stroke="#2D2D2D" stroke-width="1"/>
    <line x1="0" y1="190" x2="200" y2="190" stroke="#2D2D2D" stroke-width="1"/>
  </g>

  <text x="100" y="190" text-anchor="middle" font-family="monospace" font-size="12" fill="#6B6B6B">retro sunset ✦</text>
</svg>
